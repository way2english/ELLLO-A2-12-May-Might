*{box-sizing:border-box;margin:0;padding:0}
:root{

.hero{background:linear-gradient(135deg,#1e3a8a 0%,#4361ee 55%,#7c3aed 100%);color:#fff;padding:32px 20px 24px;text-align:center}
.hero-badge{font-size:13px;opacity:.75;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.hero h1{font-size:28px;font-weight:800;margin-bottom:6px}
.hero p{font-size:15px;opacity:.8}

.stepper{display:flex;gap:4px;min-width:max-content;padding:10px 0}
.step-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:8px 12px;border-radius:10px;font-family:inherit;font-size:11px;color:var(--muted);transition:all .2s;min-width:64px}
.step-btn .icon{font-size:20px}
.step-btn:hover{background:var(--bg);color:var(--text)}
.step-btn.active{background:#eff6ff;color:var(--blue);font-weight:700}
.step-btn.done{color:var(--green)}
main{max-width:760px;margin:0 auto;padding:24px 16px 120px}
.step-panel{display:none}
.step-panel.active{display:block;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card-title{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--text)}
/* Infographic */
.grammar-img{width:100%;border-radius:14px;display:block;margin-bottom:20px;border:1px solid var(--border)}
.grammar-label{font-size:12px;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

.vimeo-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.conv-item{background:#f1f5f9;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--text)}
.conv-item span{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}

.quizlet-wrap{border-radius:12px;overflow:hidden}
.conv-img{width:100%;border-radius:12px;margin-bottom:16px;display:block}
.quiz-q{font-weight:700;font-size:15px;margin:20px 0 10px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;background:#fff;text-align:left;transition:all .15s}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);background:#eff6ff}
.quiz-opt.correct{background:#dcfce7;border-color:var(--green);color:var(--green);font-weight:700}
.quiz-opt.wrong{background:#fee2e2;border-color:var(--red);color:var(--red)}
.quiz-opt:disabled{cursor:default}
.quiz-result{margin-top:12px;padding:10px 14px;border-radius:10px;font-weight:700;font-size:14px}
.quiz-result.pass{background:#dcfce7;color:var(--green)}
.quiz-result.fail{background:#fff7ed;color:#ea580c}
.pzl-outer{padding:20px;border:1px solid var(--border);border-radius:12px;margin-bottom:16px}
.pzl-conv-title{font-weight:800;font-size:16px;margin-bottom:14px;color:var(--text)}
.pzl-line{margin:8px 0;font-size:15px;line-height:1.9}
.pzl-sel{padding:3px 6px;border:2px solid var(--blue);border-radius:6px;font-family:inherit;font-size:14px;background:#eff6ff;color:var(--blue);cursor:pointer;margin:0 3px}
.pzl-audio-label{font-size:13px;color:var(--muted);margin:20px 0 6px;font-style:italic}
.pzl-score{margin-top:10px}
.check-btn{padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;margin-top:14px;transition:opacity .2s}
.check-btn:hover{opacity:.85}
.rslide{display:none}.rslide.active{display:block}
.r-line{margin:7px 0;font-size:15px;line-height:1.7}
.r-man{color:var(--teal);font-weight:600}.r-woman{color:var(--violet);font-weight:600}.r-role{font-weight:800}
.car-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.car-btn{padding:8px 16px;border:2px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:all .2s}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.flip-card{height:140px;perspective:800px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;text-align:center}

.flip-front .fc-text{font-size:13px;font-weight:700;line-height:1.4}

.flip-back{background:#fff;border:2px solid var(--border);color:var(--text);transform:rotateY(180deg)}
.flip-back .fc-text{font-size:13px;font-weight:700;color:var(--violet);line-height:1.4}
.flip-all-btn{margin-bottom:16px;padding:10px 20px;background:var(--violet);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:opacity .2s}
.flip-all-btn:hover{opacity:.85}
.spslide{display:none}.spslide.active{display:block}
.sp-dialog-title{font-size:16px;font-weight:800;margin-bottom:8px;color:var(--blue)}
.sp-interview-note{font-size:12px;color:var(--muted);font-style:italic;text-align:center;margin-bottom:14px;background:#f8fafc;padding:8px;border-radius:8px}
.sp-line{margin:8px 0;font-size:14px;line-height:1.7}
.sp-role{font-weight:800;color:var(--text);margin-right:6px}
.sp-blank{display:inline-block;width:260px;border-bottom:2px dashed var(--violet);color:var(--muted);font-size:13px;font-style:italic}
.results-fab{position:fixed;bottom:24px;right:20px;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;border:none;border-radius:50px;padding:14px 22px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(67,97,238,.35);z-index:100;transition:transform .2s}
.results-fab:hover{transform:scale(1.04)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:420px;width:92%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:20px;font-weight:800;margin-bottom:16px}
.modal table{width:100%;border-collapse:collapse;margin-bottom:16px}
.modal td,.modal th{padding:8px 12px;border:1px solid var(--border);font-size:14px}
.modal th{background:var(--bg);font-weight:700}
.modal-total{font-size:18px;font-weight:800;text-align:center;margin-bottom:16px;color:var(--blue)}
.results-textarea{width:100%;height:160px;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px;border:2px solid var(--border);border-radius:10px;resize:none;color:var(--text);background:var(--bg)}
.copy-btn{width:100%;padding:10px;background:var(--teal);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;margin-top:8px}
.copy-btn:hover{opacity:.85}
.modal-close{width:100%;padding:12px;background:var(--bg);border:2px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;margin-top:10px}
.modal-close:hover{background:#e2e8f0}
</style>
</head>

// ===================== STATE =====================

const STEPS = [
  {id:'watch',   icon:'🎬', label:'Watch'},
  {id:'words',   icon:'📚', label:'Слова'},
  {id:'conv1',   icon:'🎧', label:'Розмова 1'},
  {id:'conv2',   icon:'🎧', label:'Розмова 2'},
  {id:'conv3',   icon:'🎧', label:'Розмова 3'},
  {id:'conv4',   icon:'🎧', label:'Розмова 4'},
  {id:'puzzle',  icon:'🧩', label:'Пазл'},
  {id:'reading', icon:'📖', label:'Читання'},
  {id:'cards',   icon:'🃏', label:'Картки'},
  {id:'speaking',icon:'🗣️', label:'Говоримо'}
];

const correctMap = {};
const quizAnswered = {};
const quizScores = {};
const puzzleScores = {};
const carState = {r:0, sp:0};

// ===================== STEPPER =====================

function buildStepper() {
  const st = document.getElementById('stepper');
  STEPS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'step-btn';
    btn.id = 'sbtn-' + i;
    btn.innerHTML = '<span class="icon">' + s.icon + '</span><span>' + s.label + '</span>';
    btn.onclick = () => goStep(i);
    st.appendChild(btn);
  });
}

function goStep(i) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + i).classList.add('active');
  document.getElementById('sbtn-' + i).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function markDone(i) {
  const b = document.getElementById('sbtn-' + i);
  if (b) b.classList.add('done');
}

// ===================== QUIZ =====================

function answerQuiz(qKey, qi, oi, ans, convIdx, btn) {
  const ck = qKey + '-' + qi;
  if (quizAnswered[ck]) return;
  quizAnswered[ck] = true;
  correctMap[ck] = (oi === ans);
  const allOpts = btn.parentElement.querySelectorAll('.quiz-opt');
  allOpts.forEach(b => b.disabled = true);
  if (oi === ans) { btn.classList.add('correct'); }
  else { btn.classList.add('wrong'); allOpts[ans].classList.add('correct'); }
  const total = CONVS[convIdx].questions.length;
  const allDone = Array.from({length:total}, (_, k) => !!quizAnswered[qKey + '-' + k]).every(Boolean);
  if (allDone) {
    let got = 0;
    for (let k = 0; k < total; k++) { if (correctMap[qKey + '-' + k]) got++; }
    quizScores[qKey] = {got, total};
    updateFab();
    markDone(convIdx + 2);
    document.getElementById('qresult-' + convIdx).innerHTML =
      '<div class="quiz-result ' + (got === total ? 'pass' : 'fail') + '">' +
      (got === total ? '🏆' : '💪') + ' Результат: ' + got + '/' + total + '</div>';
  }
}

// ===================== PUZZLE =====================

function makeSel(answer, pi, gi, bank) {
  const shuffled = [...bank].sort(() => Math.random() - 0.5);
  let opts = '<option value="">—</option>';
  shuffled.forEach(w => { opts += '<option value="' + w + '">' + w + '</option>'; });
  return '<select class="pzl-sel" data-ans="' + answer + '" data-pi="' + pi + '" data-gi="' + gi + '">' + opts + '</select>';
}

function renderPuzzleSentences(sentences, pi, bank) {
  let html = '', gi = 0;
  sentences.forEach(sent => {
    const parts = sent.split(/\{([^}]+)\}/g);
    let line = '<p class="pzl-line">';
    for (let i = 0; i < parts.length; i++) {
      if (i % 2 === 0) { line += parts[i]; }
      else { line += makeSel(parts[i], pi, gi, bank); gi++; }
    }
    html += line + '</p>';
  });
  return html;
}

function checkPuzzle(pi, pKey) {
  const sels = document.querySelectorAll('[data-pi="' + pi + '"]');
  let got = 0, total = sels.length;
  sels.forEach(sel => {
    if (sel.value === sel.dataset.ans) {
      sel.style.background = '#dcfce7'; sel.style.color = '#16a34a'; sel.style.borderColor = '#16a34a'; got++;
    } else {
      sel.style.background = '#fee2e2'; sel.style.color = '#dc2626'; sel.style.borderColor = '#dc2626';
    }
  });
  puzzleScores[pKey] = {got, total};
  document.getElementById('pzl-score-' + pi).innerHTML =
    '<div class="quiz-result ' + (got === total ? 'pass' : 'fail') + '">' +
    (got === total ? '🏆' : '💪') + ' ' + got + '/' + total + '</div>';
  updateFab();
  markDone(6);
}

// ===================== CAROUSEL =====================

function carNav(id, dir) {
  carState[id] = Math.max(0, Math.min(3, carState[id] + dir));
  const idx = carState[id];
  const prefix = id === 'r' ? 'rslide' : 'spslide';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach((s, i) => s.classList.toggle('active', i === idx));
  document.getElementById(id + 'prev').disabled = idx === 0;
  document.getElementById(id + 'next').disabled = idx === 3;
  document.getElementById(id + 'counter').textContent = (idx + 1) + ' / 4';
  if (id === 'r'  && idx === 3) markDone(7);
  if (id === 'sp' && idx === 3) markDone(9);
}

// ===================== FLASHCARDS =====================

let allFlipped = false;
function flipAll() {
  allFlipped = !allFlipped;
  document.querySelectorAll('.flip-card').forEach(c => c.classList.toggle('flipped', allFlipped));
}

// ===================== RESULTS =====================

function updateFab() {
  let g = 0, t = 0;
  Object.values(quizScores).forEach(s   => { if (s) { g += s.got; t += s.total; } });
  Object.values(puzzleScores).forEach(s => { if (s) { g += s.got; t += s.total; } });
  document.getElementById('fabScore').textContent = g + '/' + t;
}

function openResults() {
  let rows = '', g = 0, t = 0;
  for (let i = 1; i <= 4; i++) {
    const s = quizScores['q' + i];   const v = s ? s.got + '/' + s.total : '—';
    if (s) { g += s.got; t += s.total; }
    rows += '<tr><td>Quiz ' + i + '</td><td>' + v + '</td></tr>';
  }
  for (let i = 1; i <= 4; i++) {
    const s = puzzleScores['p' + i]; const v = s ? s.got + '/' + s.total : '—';
    if (s) { g += s.got; t += s.total; }
    rows += '<tr><td>Puzzle ' + i + '</td><td>' + v + '</td></tr>';
  }
  document.getElementById('resultsBody').innerHTML = rows;
  const pct = t > 0 ? Math.round(g / t * 100) : 0;
  const medal = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '👍' : '💪';
  document.getElementById('resultsTotal').textContent = medal + ' ' + g + '/' + t + ' — ' + pct + '%';
  let txt = 'A2-12 May / Might\n' + '\u2500'.repeat(28) + '\n';
  for (let i = 1; i <= 4; i++) { const s = quizScores['q' + i];   txt += 'Quiz '   + i + ': ' + (s ? s.got + '/' + s.total : '\u2014') + '\n'; }
  for (let i = 1; i <= 4; i++) { const s = puzzleScores['p' + i]; txt += 'Puzzle ' + i + ': ' + (s ? s.got + '/' + s.total : '\u2014') + '\n'; }
  txt += '\u2500'.repeat(28) + '\n\u0417\u0430\u0433\u0430\u043b\u043e\u043c: ' + g + '/' + t + ' (' + pct + '%) ' + medal;
  document.getElementById('resultsText').value = txt;
  document.getElementById('resultsModal').classList.add('open');
}

function copyResults() {
  document.getElementById('resultsText').select();
  document.execCommand('copy');
  const btn = event.target;
  btn.textContent = '\u2705 \u0421\u043a\u043e\u043f\u0456\u0439\u043e\u0432\u0430\u043d\u043e!';
  setTimeout(() => { btn.textContent = '\ud83d\udccb \u041a\u043e\u043f\u0456\u044e\u0432\u0430\u0442\u0438 \u0434\u043b\u044f \u0432\u0447\u0438\u0442\u0435\u043b\u044f'; }, 2000);
}
